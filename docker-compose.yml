version: '3.8'
services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: yourday
    ports:
      - '5432:5432'
  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - '6379:6379'
